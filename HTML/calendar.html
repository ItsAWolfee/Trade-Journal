<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar - TradeJournal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/trade.css">
</head>

<body class="dashboard-body calendar-page">
    <!-- Sidebar is rendered by JS (renderSidebar) -->
    <aside class="sidebar"></aside>

    <main class="main-content">
        <header class="top-header">
            <div class="welcome-text">
                <h1>Calendar</h1>
                <p>Your trading month at a glance.</p>
            </div>
        </header>

        <!-- Top Stats Row -->
        <section class="stats-grid stats-grid--rich stats-grid--calendar">
            <div class="stat-card stat-card-rich">
                <div class="stat-rich-top">
                    <span class="stat-label">Net P/L <span class="stat-info" data-tooltip="Your total profit or loss across all trades, after subtracting fees.">ⓘ</span></span>
                    <span class="stat-badge" id="netPlTradeCount">0</span>
                </div>
                <div class="stat-rich-main">
                    <span class="stat-value" id="totalNetPL">$0.00</span>
                </div>
                <span class="stat-sub" id="totalFeesSub">$0.00 TOS fees</span>
            </div>

            <div class="stat-card stat-card-rich">
                <div class="stat-rich-top">
                    <span class="stat-label">Trade win %</span>
                    <span class="stat-info" data-tooltip="The percentage of your individual trades that finished in profit.">ⓘ</span>
                </div>
                <div class="stat-rich-main stat-rich-main--chart">
                    <span class="stat-value" id="winRateDisplay">0%</span>
                    <div class="stat-gauge-col">
                        <div class="stat-gauge stat-gauge--semi" id="tradeWinGauge" aria-hidden="true"></div>
                        <div class="stat-gauge-legend stat-gauge-legend--triple">
                            <span class="legend-win" id="tradeWinsCount">0</span>
                            <span class="legend-even" id="tradeBeCount">0</span>
                            <span class="legend-loss" id="tradeLossCount">0</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="stat-card stat-card-rich">
                <div class="stat-rich-top">
                    <span class="stat-label">Profit factor</span>
                    <span class="stat-info" data-tooltip="Total profit divided by total losses. Above 1 means you make more than you lose.">ⓘ</span>
                </div>
                <div class="stat-rich-main stat-rich-main--chart">
                    <span class="stat-value" id="profitFactorDisplay">0.00</span>
                    <div class="stat-gauge stat-gauge--donut" id="profitFactorGauge" aria-hidden="true"></div>
                </div>
                <span class="stat-sub" id="profitFactorSub" hidden>No Data</span>
            </div>

            <div class="stat-card stat-card-rich stat-card-rich--avg">
                <div class="stat-rich-top">
                    <span class="stat-label">Avg win/loss trade</span>
                    <span class="stat-info" data-tooltip="Your average winning trade size compared to your average losing trade size.">ⓘ</span>
                </div>
                <div class="stat-rich-main stat-rich-main--chart">
                    <span class="stat-value" id="avgWinLossRatioDisplay">0.00</span>
                    <div class="stat-gauge-col stat-gauge-col--avg">
                        <div class="stat-avg-bar" id="avgWinLossBar" aria-hidden="true">
                            <div class="stat-avg-bar-win" id="avgWinLossBarWin"></div>
                            <div class="stat-avg-bar-loss" id="avgWinLossBarLoss"></div>
                        </div>
                        <div class="stat-avg-labels">
                            <span class="legend-win" id="avgWinDisplay">$0</span>
                            <span class="legend-loss" id="avgLossDisplay">-$0</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="calendar-view" id="calendarCard" style="min-height: 560px; margin-top: 0;">
            <div class="calendar-header calendar-header--rich" style="padding: 1rem;">
                <div class="cal-title-block">
                    <div id="monthlyPnlDisplay" class="cal-monthly-pl">+$0</div>
                    <div class="cal-title-sub">Monthly P/L &middot; <span id="monthlyTradesDisplay">0 trades</span></div>
                </div>
                <div class="cal-nav-group">
                    <button class="cal-nav-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m15 18-6-6 6-6" />
                        </svg></button>
                    <h3 id="currentMonthYear">April 2026</h3>
                    <button class="cal-nav-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m9 18 6-6-6-6" />
                        </svg></button>
                </div>
                <div class="cal-actions" data-html2canvas-ignore="true">
                    <span class="stat-info" data-tooltip="Your trading month at a glance: green days were profitable, red days were losses, and holidays are marked as closed. Use the arrows to change month. Click a day to open it.">ⓘ</span>
                </div>
            </div>
            <div class="calendar-grid calendar-grid--wide-weekly">
                <div class="day-header">MON</div>
                <div class="day-header">TUE</div>
                <div class="day-header">WED</div>
                <div class="day-header">THU</div>
                <div class="day-header">FRI</div>
                <div class="day-header" style="color: var(--accent-primary);">WEEKLY</div>
                <!-- Days filled by JS -->
            </div>
        </section>
    </main>

    <script src="../JS/trade_logic.js?v=sync16"></script>
    <!-- Custom Notification/Prompt Modal -->
    <div id="notificationModal" class="notification-modal">
        <div class="notification-content">
            <div id="notificationIcon" class="notification-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
            </div>
            <h3 id="notificationTitle" class="notification-title">Notification</h3>
            <p id="notificationMessage" class="notification-message">This is a message.</p>
            <input type="text" id="notificationInput" class="notification-input" style="display: none;">
            <div id="notificationButtons" class="notification-buttons">
                <button id="notificationCancel" class="notification-btn secondary" style="display: none;">Cancel</button>
                <button id="notificationConfirm" class="notification-btn primary">OK</button>
            </div>
        </div>
    </div>
</body>

</html>
