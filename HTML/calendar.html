<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Calendar - TradeJournal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/trade.css">
</head>
<body>
    <!-- Sidebar (Shared with Dashboard) -->
    <aside class="sidebar">
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-activity"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
            <span>TradeJournal</span>
        </div>
        <nav class="nav-links">
            <a href="dashboard.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-layout-dashboard"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
                <span>Dashboard</span>
            </a>
            <a href="#" class="nav-item active">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-calendar"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
                <span>Calendar</span>
            </a>
            <a href="#" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-book"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/><path d="M6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
                <span>Journal</span>
            </a>
            <div style="height: 1px; background: var(--border); margin: 1rem 0;"></div>
            <a href="trade-replay.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m10 8 6 4-6 4z"/></svg>
                <span>Trade Replay</span>
            </a>
            <a href="progress-tracker.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
                <span>Progress Tracker</span>
            </a>
            <a href="resources.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/></svg>
                <span>Resources</span>
            </a>
        </nav>
    </aside>

    <main class="main-content" style="padding-top: 4rem;">
        <div class="calendar-view" style="min-height: 600px;">
            <div class="calendar-header" style="padding: 1rem;">
                <div style="display: flex; align-items: center; gap: 1rem;">
                     <button class="cal-nav-btn" style="background: var(--glass); padding: 0.5rem 1rem;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                     </button>
                     <h2 id="monthDisplay">April 2024</h2>
                     <button class="cal-nav-btn" style="background: var(--glass); padding: 0.5rem 1rem;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                     </button>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <div style="text-align: right;">
                        <div style="color: var(--profit-green); font-weight: bold;">+$8,450.00</div>
                        <div style="color: var(--text-muted); font-size: 0.8rem;">Monthly Net P/L</div>
                    </div>
                </div>
            </div>
            
            <div class="calendar-grid" style="grid-template-rows: repeat(6, 1fr);">
                <div class="day-header">MON</div>
                <div class="day-header">TUE</div>
                <div class="day-header">WED</div>
                <div class="day-header">THU</div>
                <div class="day-header">FRI</div>

                <!-- Days will be filled by JS -->
            </div>
        </div>

        <section class="events-list" style="margin-top: 2rem;">
            <h3>Day Details</h3>
            <div id="dayTrades" style="background: var(--bg-card); border-radius: 20px; border: 1px solid var(--border); padding: 1.5rem; margin-top: 1rem;">
                <p style="color: var(--text-muted);">Select a day to see individual trades.</p>
            </div>
        </section>
    </main>

    <script src="../JS/trade_logic.js"></script>
    <!-- Custom Notification/Prompt Modal -->
    <div id="notificationModal" class="notification-modal">
        <div class="notification-content">
            <div id="notificationIcon" class="notification-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
            </div>
            <h3 id="notificationTitle" class="notification-title">Notification</h3>
            <p id="notificationMessage" class="notification-message">This is a message.</p>
            <input type="text" id="notificationInput" class="notification-input" style="display: none;">
            <div id="notificationButtons" class="notification-buttons">
                <button id="notificationCancel" class="notification-btn secondary" style="display: none;">Cancel</button>
                <button id="notificationConfirm" class="notification-btn primary">OK</button>
            </div>
        </div>
    </div>
</body>
</html>
