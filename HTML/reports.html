<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - TradeJournal Pro</title>
    <link rel="stylesheet" href="../CSS/trade.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dashboard-body">
    <aside class="sidebar">
        <div class="logo">
            <span style="color: var(--accent-primary); font-weight: 900; letter-spacing: 1px;">TRADEJOURNAL</span>
        </div>
        <nav class="nav-links">
            <a href="dashboard.html" class="nav-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                <span>Dashboard</span>
            </a>
            <a href="day-view.html" class="nav-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                <span>Day View</span>
            </a>
            <a href="trade-view.html" class="nav-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"></path><path d="M2 17l10 5 10-5"></path><path d="M2 12l10 5 10-5"></path></svg>
                <span>Trade View</span>
            </a>
            <a href="reports.html" class="nav-item active">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path><path d="M22 12A10 10 0 0 0 12 2v10z"></path></svg>
                <span>Reports</span>
            </a>
             <div style="height: 1px; background: var(--border); margin: 1rem 0;"></div>
            <a href="trade-replay.html" class="nav-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m10 8 6 4-6 4z"/></svg>
                <span>Trade Replay</span>
            </a>
            <a href="progress-tracker.html" class="nav-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
                <span>Progress Tracker</span>
            </a>
            <a href="resources.html" class="nav-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/></svg>
                <span>Resources</span>
            </a>
        </nav>
    </aside>

    <main class="main-content" id="reportsDashboard">
        <header class="top-header">
            <h1>Performance Reports</h1>
            <div style="display: flex; gap: 1rem;">
                <button class="btn-secondary" style="padding: 0.5rem 1.5rem;">Export CSV</button>
            </div>
        </header>

        <section class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">Total Net P/L</span>
                <span class="stat-value" id="totalNetPL">$0.00</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Win Rate</span>
                <span class="stat-value" id="winRateDisplay">0%</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Profit Factor</span>
                <span class="stat-value" id="profitFactorDisplay">0.0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Total Trades</span>
                <span class="stat-value" id="totalTradesCount">0</span>
            </div>
        </section>

        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 1.5rem; margin-top: 1.5rem;">
            <section class="chart-container" style="height: 450px;">
                <h3>Equity Curve Progression</h3>
                <div class="chart-content">
                    <canvas id="equityCurveChart"></canvas>
                </div>
            </section>
            
            <section class="chart-container" style="height: 450px;">
                <h3>Win/Loss Distribution</h3>
                <div class="chart-content">
                    <canvas id="performanceRadarChart"></canvas>
                </div>
            </section>
        </div>
    </main>

    <script src="../JS/trade_logic.js"></script>
    <!-- Custom Notification/Prompt Modal -->
    <div id="notificationModal" class="notification-modal">
        <div class="notification-content">
            <div id="notificationIcon" class="notification-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
            </div>
            <h3 id="notificationTitle" class="notification-title">Notification</h3>
            <p id="notificationMessage" class="notification-message">This is a message.</p>
            <input type="text" id="notificationInput" class="notification-input" style="display: none;">
            <div id="notificationButtons" class="notification-buttons">
                <button id="notificationCancel" class="notification-btn secondary" style="display: none;">Cancel</button>
                <button id="notificationConfirm" class="notification-btn primary">OK</button>
            </div>
        </div>
    </div>
</body>
</html>
