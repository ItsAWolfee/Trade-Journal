<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade Replay - TradeJournal</title>
    <link rel="stylesheet" href="../CSS/trade.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body class="dashboard-body replay-body">
    <aside class="sidebar"></aside>

    <main class="main-content replay-page">
        <div class="replay-tv-layout">
            <!-- TradingView-style icon rail -->
            <nav class="replay-tv-rail" aria-label="Replay panels">
                <button type="button" class="replay-rail-btn replay-rail-btn--active" data-replay-panel="trades" title="Trades">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
                </button>
                <button type="button" class="replay-rail-btn" data-replay-panel="executions" title="Executions">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                </button>
                <button type="button" class="replay-rail-btn" data-replay-panel="details" title="Trade details">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
                </button>
                <button type="button" class="replay-rail-btn" data-replay-panel="watchlist" title="Watchlist">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
                <div class="replay-rail-spacer"></div>
                <button type="button" class="replay-rail-btn" id="replayOpenTvBtn" title="Open in TradingView">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                </button>
            </nav>

            <!-- Side panel -->
            <aside class="replay-side-panel" id="replaySidePanel">
                <div class="replay-symbol-bar">
                    <div class="replay-symbol-bar-left">
                        <span class="replay-symbol-ticker" id="replaySideTicker">—</span>
                        <span class="replay-symbol-badge" id="replaySideType">—</span>
                    </div>
                    <span class="replay-symbol-pnl" id="replaySidePnl">—</span>
                </div>

                <div class="replay-panel-pane replay-panel-pane--active" data-replay-pane="trades">
                    <div class="replay-pane-head">
                        <span class="replay-pane-title">Playback</span>
                    </div>
                    <div id="replayDateCalendar" class="replay-date-calendar day-picker-panel" aria-label="Select replay date"></div>
                    <div id="replayTradeList" class="replay-trade-list"></div>
                </div>

                <div class="replay-panel-pane" data-replay-pane="executions" hidden>
                    <div class="replay-pane-head">
                        <span class="replay-pane-title" id="replayExecutionsTitle">Executions</span>
                    </div>
                    <div class="replay-exec-table-head">
                        <span>Time</span><span>Price</span><span>Qty</span>
                    </div>
                    <div id="replayExecutions" class="replay-executions"></div>
                </div>

                <div class="replay-panel-pane" data-replay-pane="details" hidden>
                    <div class="replay-pane-head">
                        <span class="replay-pane-title">Trade details</span>
                    </div>
                    <div id="replayTradeDetails" class="replay-details-grid">
                        <p class="replay-empty">Select a trade to view details.</p>
                    </div>
                </div>

                <div class="replay-panel-pane" data-replay-pane="watchlist" hidden>
                    <div class="replay-pane-head">
                        <span class="replay-pane-title">Watchlist</span>
                    </div>
                    <ul id="replayWatchlist" class="replay-watchlist"></ul>
                </div>
            </aside>

            <!-- Chart stage -->
            <div class="replay-stage">
                <div class="replay-chart-toolbar">
                    <div class="replay-toolbar-left">
                        <span class="replay-toolbar-symbol" id="replayChartTitle">Select a trade</span>
                        <div class="replay-interval-pills" id="replayIntervalPills" hidden>
                            <button type="button" class="replay-pill" data-replay-interval="1">1m</button>
                            <button type="button" class="replay-pill" data-replay-interval="3">3m</button>
                            <button type="button" class="replay-pill replay-pill--active" data-replay-interval="5">5m</button>
                        </div>
                        <span class="replay-data-badge" id="replayDataBadge"></span>
                    </div>
                    <div class="replay-ohlc" id="replayOhlc">
                        <span>O <b id="replayO">—</b></span>
                        <span>H <b id="replayH">—</b></span>
                        <span>L <b id="replayL">—</b></span>
                        <span>C <b id="replayC">—</b></span>
                    </div>
                    <div class="replay-toolbar-right">
                        <span class="replay-chart-pnl" id="replayChartPnl">—</span>
                        <span class="replay-chart-meta" id="replayChartMeta">—</span>
                    </div>
                </div>

                <div id="replayDrawStyleBar" class="replay-draw-style-bar" hidden>
                    <div class="replay-style-colors" id="replayStyleColors"></div>
                    <div class="replay-style-widths">
                        <button type="button" class="replay-style-width" data-width="1">1px</button>
                        <button type="button" class="replay-style-width replay-style-width--active" data-width="2">2px</button>
                        <button type="button" class="replay-style-width" data-width="3">3px</button>
                    </div>
                    <label class="replay-style-opacity">
                        <span>Opacity</span>
                        <input type="range" id="replayStyleOpacity" min="20" max="100" value="100">
                        <span id="replayStyleOpacityVal">100%</span>
                    </label>
                </div>

                <div class="replay-chart-area">
                    <nav class="replay-draw-rail" id="replayDrawRail" aria-label="Drawing tools">
                        <div class="replay-draw-intervals" aria-label="Chart interval">
                            <button type="button" class="replay-draw-interval" data-replay-interval="1" title="1 minute">1m</button>
                            <button type="button" class="replay-draw-interval" data-replay-interval="3" title="3 minutes">3m</button>
                            <button type="button" class="replay-draw-interval replay-draw-interval--active" data-replay-interval="5" title="5 minutes">5m</button>
                        </div>
                        <div class="replay-draw-divider"></div>
                        <button type="button" class="replay-draw-btn replay-draw-btn--active" data-draw-tool="crosshair" title="Crosshair (pan chart)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2v20M2 12h20" stroke-dasharray="3 3"/></svg>
                        </button>
                        <button type="button" class="replay-draw-btn" data-draw-tool="trendline" title="Trend line">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="5" cy="19" r="2"/><circle cx="19" cy="5" r="2"/><path d="M7 17L17 7"/></svg>
                        </button>
                        <button type="button" class="replay-draw-btn" data-draw-tool="hline" title="Horizontal line">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 12h16"/><circle cx="6" cy="12" r="1.5" fill="currentColor"/><circle cx="18" cy="12" r="1.5" fill="currentColor"/></svg>
                        </button>
                        <button type="button" class="replay-draw-btn" data-draw-tool="measure" title="Measure">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 17 17 3"/><path d="m14 6 4 4"/></svg>
                        </button>
                        <button type="button" class="replay-draw-btn" data-draw-tool="text" title="Text label">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 7V4h16v3M12 4v16M8 20h8"/></svg>
                        </button>
                        <button type="button" class="replay-draw-btn" data-draw-tool="brush" title="Freehand brush">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="m9 18 6-6-3-3-6 6v3h3Z"/><path d="M14 7l3 3"/></svg>
                        </button>
                        <div class="replay-draw-divider"></div>
                        <button type="button" class="replay-draw-btn" id="replayZoomInBtn" title="Zoom in">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4M11 8v6M8 11h6"/></svg>
                        </button>
                        <button type="button" class="replay-draw-btn" id="replayZoomOutBtn" title="Zoom out">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4M8 11h6"/></svg>
                        </button>
                        <button type="button" class="replay-draw-btn" id="replayFitBtn" title="Fit chart">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 9V4h5M15 4h5v5M20 15v5h-5M9 20H4v-5"/></svg>
                        </button>
                        <div class="replay-draw-divider"></div>
                        <button type="button" class="replay-draw-btn" id="replayLockLevelsBtn" title="Lock PM/PD levels">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
                        </button>
                        <button type="button" class="replay-draw-btn" id="replayHideLevelsBtn" title="Hide/show levels">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                        <button type="button" class="replay-draw-btn" id="replayUndoBtn" title="Undo (Ctrl+Z)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 14H4V9"/><path d="M4 14c2.5-4 7-6 11-4.5"/></svg>
                        </button>
                        <button type="button" class="replay-draw-btn" id="replayRedoBtn" title="Redo (Ctrl+Shift+Z)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M15 14h5V9"/><path d="M20 14c-2.5-4-7-6-11-4.5"/></svg>
                        </button>
                        <button type="button" class="replay-draw-btn" id="replayClearDrawBtn" title="Remove drawings">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>
                        </button>
                    </nav>
                    <div class="replay-chart-wrap">
                        <div id="replayChart" class="replay-chart"></div>
                        <div id="replaySessionOverlay" class="replay-session-overlay" aria-hidden="true"></div>
                        <div id="replayExecOverlay" class="replay-exec-overlay" aria-hidden="true"></div>
                        <div id="replayLevelHandles" class="replay-level-handles" aria-hidden="true"></div>
                        <canvas id="replayBrushCanvas" class="replay-brush-canvas" aria-hidden="true"></canvas>
                        <div id="replayTextLayer" class="replay-text-layer" aria-hidden="true"></div>
                        <div id="replayMeasureLabel" class="replay-measure-label" hidden></div>
                        <div id="replayChartStatus" class="replay-chart-status" hidden></div>
                    </div>
                </div>

                <div class="replay-controls">
                    <div class="replay-controls-top">
                        <label class="replay-speed">
                            <span id="replaySpeedLabel">1x</span>
                            <input type="range" id="replaySpeed" min="0.5" max="4" step="0.5" value="1">
                        </label>
                        <input type="range" id="replayProgress" class="replay-progress" min="0" max="0" value="0">
                        <span class="replay-progress-label" id="replayProgressLabel">0 / 0</span>
                    </div>
                    <div class="replay-controls-buttons">
                        <button type="button" class="replay-ctrl-btn" id="replayStartBtn" title="Jump to start">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
                        </button>
                        <button type="button" class="replay-ctrl-btn" id="replayBackBtn" title="Step back one candle">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
                        </button>
                        <button type="button" class="replay-ctrl-btn replay-ctrl-btn--play" id="replayPlayBtn" title="Play / Pause">
                            <svg id="replayPlayIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                        </button>
                        <button type="button" class="replay-ctrl-btn" id="replayForwardBtn" title="Move one candle forward">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2-12v12h2V6H8z"/></svg>
                        </button>
                        <button type="button" class="replay-ctrl-btn" id="replayEndBtn" title="Jump to end">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 18h2V6h-2v12zM6 6v12l8.5-6L6 6z"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../JS/trade_logic.js?v=sync30"></script>
    <div id="notificationModal" class="notification-modal">
        <div class="notification-content">
            <div id="notificationIcon" class="notification-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
            </div>
            <h3 id="notificationTitle" class="notification-title">Notification</h3>
            <p id="notificationMessage" class="notification-message">This is a message.</p>
            <input type="text" id="notificationInput" class="notification-input" style="display: none;">
            <div id="notificationButtons" class="notification-buttons">
                <button id="notificationCancel" class="notification-btn secondary" style="display: none;">Cancel</button>
                <button id="notificationConfirm" class="notification-btn primary">OK</button>
            </div>
        </div>
    </div>
</body>
</html>
